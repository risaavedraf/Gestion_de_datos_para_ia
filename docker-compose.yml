version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://fraud_user:fraud_pass@db:5432/fraud_db
      - APP_ENV=development
      - LOG_LEVEL=INFO
      - DATA_SAMPLE_SIZE=10000
      - ADMIN_API_TOKEN=${ADMIN_API_TOKEN:-change-me-local-admin-token}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./Data:/app/Data
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./models:/app/models
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=fraud_db
      - POSTGRES_USER=fraud_user
      - POSTGRES_PASSWORD=fraud_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud_user -d fraud_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
